services:
  # Backend API + Socket.IO
  - type: web
    name: syncspace-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build && npm run db:migrate
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: syncspace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          name: syncspace-frontend
          type: web
          property: host
          format: https://{host}
    healthCheckPath: /health

  # Frontend React SPA
  - type: web
    name: syncspace-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: syncspace-backend
          type: web
          property: host
          format: https://{host}/api
      - key: VITE_SOCKET_URL
        fromService:
          name: syncspace-backend
          type: web
          property: host
          format: https://{host}
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: syncspace-db
    databaseName: syncspace
    user: syncspace_user
    plan: free
    region: oregon
